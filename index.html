<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MasterShelf">
<meta name="theme-color" content="#7C6EFA">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>The MasterShelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<!-- Cropper.js（画像トリミング） -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0E0E12;--bg2:#17171D;--bg3:#1E1E27;--surface:#25252F;--surface2:#2D2D38;
  --accent:#7C6EFA;--accent2:#A89FFF;--amber:#F0A020;--green:#3FBA7A;--coral:#F06060;
  --text:#F0EFF8;--text2:#9492AA;--text3:#5A5870;
  --border:#33323F;--radius:12px;--radiusSm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden;}
#app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg);}
.header{display:flex;align-items:center;justify-content:space-between;padding:52px 20px 12px;background:var(--bg);flex-shrink:0;}
.header-logo{height:52px;width:auto;display:block;}
.header-icons{display:flex;gap:18px;align-items:center;}
.icon-btn{background:transparent;border:none;color:var(--text2);cursor:pointer;padding:12px;display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;}
.icon-btn svg{width:26px;height:26px;}
.cat-tabs{display:flex;gap:4px;padding:0 10px 10px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;justify-content:space-between;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{display:flex;align-items:center;gap:3px;padding:7px 9px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500;}
.tag-row{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;}
.tag-row::-webkit-scrollbar{display:none;}
.tag-row.hidden{padding:0;max-height:0;overflow:hidden;}
.tag-chip{padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;}
.tag-chip.active{background:var(--surface2);border-color:var(--accent2);color:var(--accent2);}
.tag-chip.add-tag{color:var(--accent);border-color:var(--accent);border-style:dashed;}
.sort-bar{display:flex;align-items:center;gap:7px;padding:0 14px 8px;flex-shrink:0;}
.sort-label{font-size:11px;color:var(--text3);}
.sort-btn{padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.sort-btn.active{background:var(--surface2);border-color:var(--text2);color:var(--text);}
.list-area{flex:1;padding:0 12px 80px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.item-card{display:flex;align-items:stretch;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;position:relative;touch-action:pan-y;}
.item-card.dragging{opacity:.75;border-color:var(--accent);box-shadow:0 8px 28px rgba(124,110,250,.3);}
.item-card.drag-over-top::before{content:'';position:absolute;top:-4px;left:0;right:0;height:3px;background:var(--accent);border-radius:2px;z-index:1;}
.item-card.drag-over-bottom::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:3px;background:var(--accent);border-radius:2px;z-index:1;}
.drag-handle{display:flex;align-items:center;justify-content:center;width:36px;min-height:80px;color:var(--text3);background:var(--bg3);cursor:grab;flex-shrink:0;touch-action:none;}
.drag-handle svg{width:18px;height:18px;}
.item-body{flex:1;padding:12px 8px;min-width:0;}
.item-top{display:flex;align-items:flex-start;gap:7px;margin-bottom:4px;}
.item-emoji{font-size:15px;margin-top:1px;flex-shrink:0;}
.item-title-wrap{flex:1;min-width:0;}
.item-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.35;}
.item-yomi{font-size:11px;color:var(--text3);margin-top:2px;}
.item-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.status-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;}
.badge-free{background:rgba(63,186,122,.15);color:#3FBA7A;}
.badge-paid{background:rgba(240,160,32,.15);color:#F0A020;}
.badge-unknown{background:rgba(90,88,112,.2);color:var(--text3);}
.item-price{font-size:11px;color:var(--amber);font-family:'Space Mono',monospace;}
.item-deadline{font-size:11px;display:flex;align-items:center;gap:3px;}
.item-tags{display:flex;gap:4px;flex-wrap:wrap;}
.item-tag{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:4px;}
.item-actions{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 10px;gap:8px;flex-shrink:0;}
.alexa-launch-btn{display:flex;align-items:center;gap:4px;padding:7px 10px;background:linear-gradient(135deg,#1565C0,#1A7AEE);border-radius:var(--radiusSm);border:none;color:#fff;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Space Mono',monospace;}
.alexa-launch-btn svg{width:12px;height:12px;}
.edit-btn{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.edit-btn svg{width:15px;height:15px;}
.delete-btn{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.delete-btn svg{width:15px;height:15px;}
.fab{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:30px;background:var(--accent);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(124,110,250,.45);z-index:50;}
.fab svg{width:28px;height:28px;}
/* モーダル共通 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-size:16px;font-weight:700;}
.close-btn{background:var(--surface);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.close-btn svg{width:18px;height:18px;}
.upload-btn{width:100%;padding:15px;border:1.5px dashed var(--accent);border-radius:var(--radius);background:rgba(124,110,250,.07);color:var(--accent2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;font-family:'Noto Sans JP',sans-serif;}
.form-label{font-size:12px;color:var(--text3);margin-bottom:5px;display:block;}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radiusSm);color:var(--text);padding:12px 14px;font-size:15px;margin-bottom:14px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.form-input:focus{border-color:var(--accent);}
.cat-select-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.cat-sel-btn{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.cat-sel-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.form-select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radiusSm);color:var(--text);padding:12px 14px;font-size:15px;margin-bottom:14px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.form-row{display:flex;gap:10px;}
.form-row>div{flex:1;}
.submit-btn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:4px;}
/* 確認ダイアログ */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px;}
.confirm-box{background:var(--bg2);border-radius:var(--radius);padding:22px;width:100%;max-width:320px;border:1px solid var(--border);}
.confirm-title{font-size:15px;font-weight:500;margin-bottom:8px;}
.confirm-name{font-size:13px;color:var(--text2);margin-bottom:16px;}
.confirm-btns{display:flex;gap:8px;}
.confirm-cancel{flex:1;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radiusSm);color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:14px;}
.confirm-del{flex:1;padding:12px;background:rgba(240,96,96,.15);border:1px solid var(--coral);border-radius:var(--radiusSm);color:var(--coral);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:14px;}
/* 設定画面 */
.settings-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;}
.settings-header{display:flex;align-items:center;gap:12px;padding:52px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.settings-back{background:transparent;border:none;color:var(--text2);cursor:pointer;padding:4px;display:flex;align-items:center;}
.settings-back svg{width:24px;height:24px;}
.settings-title{font-size:17px;font-weight:700;}
.settings-body{flex:1;overflow-y:auto;padding:16px 16px 40px;}
.settings-section{margin-bottom:28px;}
.settings-section-title{font-size:11px;color:var(--text3);margin-bottom:10px;letter-spacing:.08em;text-transform:uppercase;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--surface);border-radius:var(--radiusSm);margin-bottom:6px;}
.settings-row-name{font-size:15px;}
.toggle{width:46px;height:27px;border-radius:14px;background:var(--border);position:relative;cursor:pointer;border:none;flex-shrink:0;transition:background .2s;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;width:21px;height:21px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;}
.toggle.on::after{transform:translateX(19px);}
/* タグ管理 */
.tag-section-label{font-size:13px;font-weight:500;color:var(--accent2);margin:16px 0 8px 2px;}
.tag-manage-row{display:flex;align-items:center;padding:10px 14px;background:var(--surface);border-radius:var(--radiusSm);margin-bottom:6px;gap:6px;}
.tag-manage-name{font-size:14px;color:var(--text2);flex:1;}
.tag-move-btns{display:flex;flex-direction:row;gap:6px;flex-shrink:0;}
.tag-move-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:6px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;}
.tag-move-btn:active{background:var(--accent);color:#fff;border-color:var(--accent);}
.tag-move-btn:disabled{opacity:.2;cursor:default;}
.tag-del-btn{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.tag-del-btn svg{width:14px;height:14px;}
.add-tag-row{display:flex;gap:8px;margin-top:8px;margin-bottom:4px;}
.add-tag-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radiusSm);color:var(--text);padding:10px 12px;font-size:14px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.add-tag-input:focus{border-color:var(--accent);}
.add-tag-btn{padding:10px 16px;background:var(--accent);border:none;border-radius:var(--radiusSm);color:#fff;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
/* アプリ更新ボタン */
.update-section{margin-top:8px;padding:16px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);}
.update-desc{font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.6;}
.update-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#5B4FD9);border:none;border-radius:var(--radiusSm);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.update-btn:active{opacity:.85;}
.reset-btn{width:100%;padding:14px;background:transparent;border:1px solid var(--coral);border-radius:var(--radiusSm);color:var(--coral);font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:10px;}
.reset-btn:active{background:rgba(240,96,96,.1);}
.update-btn svg{width:18px;height:18px;}
/* Toast */
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:11px 22px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}
.empty-state svg{width:44px;height:44px;margin:0 auto 12px;display:block;opacity:.4;}
/* 画像・リンク */
.item-thumb{width:52px;min-width:52px;height:52px;border-radius:6px;object-fit:cover;margin-right:6px;background:var(--bg3);}
.item-link{font-size:11px;color:var(--accent2);text-decoration:none;display:flex;align-items:center;gap:3px;margin-top:3px;word-break:break-all;}
.item-link svg{width:11px;height:11px;flex-shrink:0;}
.link-input-row{display:flex;gap:6px;margin-bottom:14px;}
.link-input-row input{flex:1;}
.link-fetch-btn{padding:0 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radiusSm);color:var(--accent2);font-size:13px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;}
.image-preview-wrap{position:relative;margin-bottom:14px;}
.image-preview-wrap img{width:100%;max-height:140px;object-fit:cover;border-radius:var(--radiusSm);}
.image-preview-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
/* OCRステータス */
.ocr-status{font-size:12px;color:var(--accent2);padding:4px 2px;margin-bottom:10px;}
/* トリミングモーダル */
.crop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;display:flex;flex-direction:column;}
.crop-header{display:flex;align-items:center;justify-content:space-between;padding:52px 16px 12px;flex-shrink:0;}
.crop-title{font-size:16px;font-weight:700;color:var(--text);}
.crop-body{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:0 8px;}
.crop-body img{max-width:100%;max-height:100%;}
.crop-footer{display:flex;gap:10px;padding:16px;flex-shrink:0;}
.crop-cancel-btn{flex:1;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:15px;}
.crop-confirm-btn{flex:2;padding:14px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <img src="logo.png" alt="The MasterShelf" class="header-logo" />
    <div class="header-icons">
      <button class="icon-btn" onclick="openSettings()" aria-label="設定">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="tag-row" id="tagRow"></div>
  <div class="sort-bar">
    <span class="sort-label">並び順:</span>
    <button class="sort-btn active" data-sort="custom" onclick="setSort('custom')">登録順</button>
    <button class="sort-btn" data-sort="deadline" onclick="setSort('deadline')">期限順</button>
    <button class="sort-btn" data-sort="alpha" onclick="setSort('alpha')">AZ順</button>
  </div>
  <div class="list-area" id="listArea"></div>
  <button class="fab" onclick="openModal(null)" aria-label="追加">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</div>

<!-- 追加／編集モーダル -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="closeModalIfBg(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitleLabel">アイテムを追加</span>
      <button class="close-btn" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <!-- 画像・URL入力エリア（新規・編集共通で常に表示） -->
    <div id="ocrBtnArea">
      <label class="upload-btn" for="screenshotInput">
        🖼️ ギャラリーから画像・スクショを選択
      </label>
      <input type="file" id="screenshotInput" accept="image/*" style="display:none;" onchange="handleImageSelect(event)" />
      <div id="ocrPreview" style="display:none;margin-bottom:12px;">
        <div class="image-preview-wrap">
          <img id="ocrPreviewImg" alt="preview" />
          <button class="image-preview-del" onclick="clearImage()">✕</button>
        </div>
        <div id="ocrStatus" class="ocr-status"></div>
      </div>
      <label class="form-label">URLリンク（任意）</label>
      <div class="link-input-row">
        <input class="form-input" id="newLink" placeholder="https://..." style="margin-bottom:0;" />
        <button class="link-fetch-btn" onclick="fetchLinkTitle()">取得</button>
      </div>
    </div>
    <label class="form-label">タイトル</label>
    <input class="form-input" id="newTitle" placeholder="例: ソニー ワイヤレスイヤホン WH-1000XM5" />
    <label class="form-label">読み仮名（任意・Alexaに話しかけるとき用）</label>
    <input class="form-input" id="newYomi" placeholder="例: ソニー ワイヤレスイヤホン" />
    <label class="form-label">大項目</label>
    <div class="cat-select-row" id="catSelectRow"></div>
    <div id="statusSection">
      <label class="form-label">状態</label>
      <select class="form-select" id="statusSelect"></select>
    </div>
    <div id="typeSection" style="display:none;">
      <label class="form-label">種別</label>
      <select class="form-select" id="typeSelect">
        <option value="album">アルバム</option>
        <option value="song">曲</option>
      </select>
    </div>
    <div id="interestSection" style="display:none;">
      <div class="form-row">
        <div>

<script>
// ===== SVGアイコン =====
const SVG_GRIP  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="9" y1="6" x2="15" y2="6"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="18" x2="15" y2="18"/></svg>`;
const SVG_PLAY  = `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`;
const SVG_EDIT  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const SVG_TRASH = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

// ===== 定数 =====
const ALL_CATS = [
  {id:'music',    label:'音楽',   emoji:'🎵'},
  {id:'movie',    label:'映画',   emoji:'🎬'},
  {id:'book',     label:'読書',   emoji:'📚'},
  {id:'interest', label:'関心',   emoji:'✨'},
  {id:'other',    label:'その他', emoji:'📦'},
];
// 状態区分（全カテゴリに「不明」追加）
const STATUS_OPTIONS = {
  music:    [{v:'free',l:'無料'},{v:'paid',l:'有料'},{v:'unknown',l:'不明'}],
  movie:    [{v:'free',l:'無料'},{v:'paid',l:'有料'},{v:'unknown',l:'不明'}],
  other:    [{v:'free',l:'無料'},{v:'paid',l:'有料'},{v:'unknown',l:'不明'}],
  book:     [{v:'free',l:'無料'},{v:'general',l:'一般'},{v:'unknown',l:'不明'}],
  interest: [],
};

// ===== localStorage =====
function saveData(){
  try{
    localStorage.setItem('clip_items',  JSON.stringify(items));
    localStorage.setItem('clip_tags',   JSON.stringify(CAT_TAGS));
    localStorage.setItem('clip_hidden', JSON.stringify([...hiddenCats]));
  }catch(e){}
}
function loadData(){
  try{
    const si=localStorage.getItem('clip_items');  if(si) items=JSON.parse(si);
    const st=localStorage.getItem('clip_tags');   if(st) CAT_TAGS=JSON.parse(st);
    const sh=localStorage.getItem('clip_hidden'); if(sh) hiddenCats=new Set(JSON.parse(sh));
  }catch(e){}
}

// ===== 状態変数 =====
let hiddenCats = new Set();
let CAT_TAGS = {
  music:    ['#朝用','#ディナー','#テンションアップ','#邦楽','#海外'],
  movie:    ['#土日用','#ディナー','#海外'],
  book:     ['#土日用','#集中'],
  interest: ['#ガジェット','#ファッション','#食品'],
  other:    ['#メモ','#その他'],
};
let items = [];
let activeCat = 'music';
let activeTags = new Set();
let sortMode = 'custom';
let editingId = null;
let newCatSel = 'music', newTagSel = new Set();
let pendingDeleteId = null;
let pendingDeleteTag = null, pendingDeleteTagCat = null;
let cropperInstance = null;

// ===== ヘルパー =====
function visibleCats(){ return ALL_CATS.filter(c=>!hiddenCats.has(c.id)); }
function catEmoji(c){ return ALL_CATS.find(x=>x.id===c)?.emoji||'📦'; }

function statusBadge(s){
  if(!s||s==='unknown') return '<span class="status-badge badge-unknown">不明</span>';
  if(s==='free')        return '<span class="status-badge badge-free">無料</span>';
  if(s==='paid')        return '<span class="status-badge badge-paid">有料</span>';
  if(s==='general')     return '<span class="status-badge badge-free">一般</span>';
  return '';
}
function deadlineBadge(d){
  if(!d) return '';
  const days=Math.round((new Date(d)-new Date())/(1000*86400));
  const col=days<=3?'var(--coral)':days<=7?'var(--amber)':'var(--text2)';
  return `<span class="item-deadline" style="color:${col}">🔔 ${d}（${days}日後）</span>`;
}

// ===== 描画 =====
function renderCatTabs(){
  const cats=visibleCats();
  if(!cats.find(c=>c.id===activeCat)) activeCat=cats[0]?.id||'music';
  document.getElementById('catTabs').innerHTML=cats.map(c=>
    `<button class="cat-tab${activeCat===c.id?' active':''}" onclick="setCat('${c.id}')">${c.emoji} ${c.label}</button>`
  ).join('');
}
function renderTagRow(){
  const tags=CAT_TAGS[activeCat]||[];
  const row=document.getElementById('tagRow');
  if(!tags.length){ row.innerHTML=''; row.classList.add('hidden'); return; }
  row.classList.remove('hidden');
  row.innerHTML=tags.map(t=>
    `<button class="tag-chip${activeTags.has(t)?' active':''}" onclick="toggleTag('${t}')">${t}</button>`
  ).join('')+`<button class="tag-chip add-tag" onclick="addTagFromRow()">＋ タグ</button>`;
}
function setCat(id){ activeCat=id; activeTags.clear(); renderCatTabs(); renderTagRow(); renderList(); }
function toggleTag(t){ activeTags.has(t)?activeTags.delete(t):activeTags.add(t); renderTagRow(); renderList(); }
function setSort(m){
  sortMode=m;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.sort===m));
  renderList();
}
function getFiltered(){
  let res=items.filter(i=>i.cat===activeCat);
  if(activeTags.size>0) res=res.filter(i=>(i.tags||[]).some(t=>activeTags.has(t)));
  if(sortMode==='alpha') res.sort((a,b)=>a.title.localeCompare(b.title,'ja'));
  else if(sortMode==='deadline') res.sort((a,b)=>{
    if(!a.deadline&&!b.deadline) return 0;
    if(!a.deadline) return 1; if(!b.deadline) return -1;
    return new Date(a.deadline)-new Date(b.deadline);
  });
  else res.sort((a,b)=>a.order-b.order);
  return res;
}

function renderList(){
  const el=document.getElementById('listArea');
  const list=getFiltered();
  if(!list.length){
    el.innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg><div>＋ボタンからアイテムを追加してください</div></div>`;
    return;
  }
  el.innerHTML=list.map(item=>{
    const tags=(item.tags||[]).map(t=>`<span class="item-tag">${t}</span>`).join('');
    const priceStr=item.price?`<span class="item-price">¥${item.price.toLocaleString()}</span>`:'';
    const thumbHtml=item.image?`<img class="item-thumb" src="${item.image}" alt="thumb" />`:'';
    const safeLink=item.link?item.link.replace(/"/g,'&quot;'):'';
    const linkHtml=item.link?`<a class="item-link" href="${safeLink}" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${item.link.length>35?item.link.substring(0,35)+'...':item.link}</a>`:'';
    const safeTitle=item.title.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const canAlexa=item.cat==='music'||item.cat==='movie';
    return `<div class="item-card" id="card-${item.id}" data-id="${item.id}">
      <div class="drag-handle" data-id="${item.id}">${SVG_GRIP}</div>
      <div class="item-body">
        <div class="item-top">
          ${thumbHtml}
          <div class="item-title-wrap">
            <div class="item-title">${item.title}</div>
            ${item.yomi?`<div class="item-yomi">${item.yomi}</div>`:''}
            ${linkHtml}
          </div>
        </div>
        <div class="item-meta">
          ${item.cat!=='interest'?statusBadge(item.status):''}
          ${priceStr}
          ${item.deadline?deadlineBadge(item.deadline):''}
        </div>
        <div class="item-tags">${tags}</div>
      </div>
      <div class="item-actions">
        ${canAlexa?`<button class="alexa-launch-btn" onclick="launchOfficialApp('${item.cat}','${safeTitle}')">${SVG_PLAY}Alexa</button>`:''}
        <button class="edit-btn" onclick="openModal(${item.id})">${SVG_EDIT}</button>
        <button class="delete-btn" onclick="confirmDelete(${item.id})">${SVG_TRASH}</button>
      </div>
    </div>`;
  }).join('');
  initTouchDrag();
}

// ===== Alexa / Amazon アプリ起動 =====
function launchOfficialApp(cat, query){
  if(!query) return;
  const q=encodeURIComponent(query);
  let url='';
  if(cat==='music')      url=`amznmp://share?searchQuery=${q}`;
  else if(cat==='movie') url=`primevideo://search?phrase=${q}`;
  if(!url) return;
  window.location.href=url;
  setTimeout(()=>{
    if(document.hidden||document.webkitHidden) return;
    let web='';
    if(cat==='music')      web=`https://music.amazon.co.jp/search/${q}`;
    else if(cat==='movie') web=`https://www.amazon.co.jp/s?k=${q}&i=instant-video`;
    if(web) window.open(web,'_blank');
  },1500);
}

// ===== タッチドラッグ（リスト並び替え）=====
function initTouchDrag(){
  const la=document.getElementById('listArea');
  const newLa=la.cloneNode(true);
  la.parentNode.replaceChild(newLa,la);

  let dragId=null, ghost=null, startY=0, origRect=null;

  function getAllCards(){ return [...document.getElementById('listArea').querySelectorAll('.item-card')]; }
  function getLA(){ return document.getElementById('listArea'); }

  getLA().addEventListener('touchstart',function(e){
    const handle=e.target.closest('.drag-handle');
    if(!handle) return;
    const card=handle.closest('.item-card');
    if(!card) return;
    dragId=parseInt(card.dataset.id);
    origRect=card.getBoundingClientRect();
    startY=e.touches[0].clientY;
    ghost=card.cloneNode(true);
    ghost.style.cssText=[
      'position:fixed',`left:${origRect.left}px`,`top:${origRect.top}px`,
      `width:${origRect.width}px`,'z-index:9999','opacity:0.85',
      'pointer-events:none','border:2px solid var(--accent)',
      'border-radius:12px','background:var(--surface)',
      'box-shadow:0 8px 28px rgba(124,110,250,.4)','transition:none'
    ].join(';');
    document.body.appendChild(ghost);
    card.style.opacity='0.25';
    e.preventDefault();
  },{passive:false});

  document.addEventListener('touchmove',function(e){
    if(dragId===null||!ghost) return;
    e.preventDefault();
    const ty=e.touches[0].clientY;
    ghost.style.top=(origRect.top+(ty-startY))+'px';
    getAllCards().forEach(c=>c.classList.remove('drag-over-top','drag-over-bottom'));
    const ghostCY=origRect.top+(ty-startY)+origRect.height/2;
    const target=getAllCards().find(c=>{
      if(parseInt(c.dataset.id)===dragId) return false;
      const r=c.getBoundingClientRect();
      return ghostCY>=r.top&&ghostCY<=r.bottom;
    });
    if(target){
      const tr=target.getBoundingClientRect();
      target.classList.add(ghostCY<tr.top+tr.height/2?'drag-over-top':'drag-over-bottom');
    }
  },{passive:false});

  document.addEventListener('touchend',function(e){
    if(dragId===null||!ghost) return;
    const ty=e.changedTouches[0].clientY;
    const ghostCY=origRect.top+(ty-startY)+origRect.height/2;
    const target=getAllCards().find(c=>{
      if(parseInt(c.dataset.id)===dragId) return false;
      const r=c.getBoundingClientRect();
      return ghostCY>=r.top&&ghostCY<=r.bottom;
    });
    if(target){
      const targetId=parseInt(target.dataset.id);
      const tr=target.getBoundingClientRect();
      const insertAfter=ghostCY>=tr.top+tr.height/2;
      const di=items.findIndex(x=>x.id===dragId);
      if(di!==-1){
        const [moved]=items.splice(di,1);
        const ni=items.findIndex(x=>x.id===targetId);
        items.splice(insertAfter?ni+1:ni,0,moved);
        items.forEach((x,i)=>x.order=i);
        saveData();
      }
    }
    ghost.remove(); ghost=null;
    getAllCards().forEach(c=>{ c.classList.remove('drag-over-top','drag-over-bottom'); c.style.opacity=''; });
    dragId=null;
    renderList();
  });
}

// ===== 削除 =====
function confirmDelete(id){
  pendingDeleteId=id;
  document.getElementById('confirmItemName').textContent=items.find(x=>x.id===id)?.title||'';
  document.getElementById('confirmOverlay').style.display='flex';
}
function closeConfirm(){ document.getElementById('confirmOverlay').style.display='none'; pendingDeleteId=null; }
function executeDelete(){
  if(pendingDeleteId){
    items=items.filter(x=>x.id!==pendingDeleteId);
    saveData(); closeConfirm(); renderList(); showToast('削除しました');
  }
}

// ===== 追加／編集モーダル =====
function openModal(id){
  editingId=id;
  const item=id?items.find(x=>x.id===id):null;
  document.getElementById('modalTitleLabel').textContent=item?'アイテムを編集':'アイテムを追加';

  document.getElementById('newLink').value=item?.link||'';
  document.getElementById('priceInput').value=item?.price||'';
  document.getElementById('deadlineInput').value=item?.deadline||'';
  document.getElementById('screenshotInput').value='';
  document.getElementById('ocrStatus').textContent='';

    document.getElementById('ocrPreviewImg').src=item.image;
    document.getElementById('ocrPreview').style.display='block';
  } else {
    document.getElementById('ocrPreview').style.display='none';

  }

    if(item.status) document.getElementById('statusSelect').value=item.status;

function closeModal(){ document.getElementById('modalOverlay').style.display='none'; editingId=null; }
function closeModalIfBg(e){ if(e.target.id==='modalOverlay') closeModal(); }

function renderCatSelect(){
  document.getElementById('catSelectRow').innerHTML=ALL_CATS.map(c=>
    `<button class="cat-sel-btn${newCatSel===c.id?' selected':''}" onclick="selectNewCat('${c.id}')">${c.emoji} ${c.label}</button>`
  ).join('');
}
function selectNewCat(id){ newCatSel=id; newTagSel=new Set(); renderCatSelect(); updateDynamicFields(); renderTagSelect(); }

function updateDynamicFields(){
  const opts=STATUS_OPTIONS[newCatSel]||[];
  const ss=document.getElementById('statusSection');
  const ts=document.getElementById('typeSection');
  const is=document.getElementById('interestSection');
  if(newCatSel==='interest'){
    ss.style.display='none'; is.style.display='block';
  } else {
    ss.style.display='block'; is.style.display='none';
    document.getElementById('statusSelect').innerHTML=opts.map(o=>`<option value="${o.v}">${o.l}</option>`).join('');
  }
  ts.style.display=newCatSel==='music'?'block':'none';
}

function renderTagSelect(){
  const tags=CAT_TAGS[newCatSel]||[];
  document.getElementById('tagSelectRow').innerHTML=tags.map(t=>
    `<button class="tag-chip${newTagSel.has(t)?' active':''}" onclick="toggleNewTag('${t}')">${t}</button>`
  ).join('')+`<button class="tag-chip add-tag" onclick="addTagInModal()">＋ 新規</button>`;
}
function toggleNewTag(t){ newTagSel.has(t)?newTagSel.delete(t):newTagSel.add(t); renderTagSelect(); }
function addTagInModal(){
  const t=prompt('新しいタグ名（例: 夜用）:');
  if(t&&t.trim()){
    const tag='#'+t.trim().replace(/^#/,'');
    if(!CAT_TAGS[newCatSel]) CAT_TAGS[newCatSel]=[];
    if(!CAT_TAGS[newCatSel].includes(tag)) CAT_TAGS[newCatSel].push(tag);
    saveData(); renderTagSelect(); renderTagRow();
  }
}
function addTagFromRow(){
  const t=prompt('新しいタグ名（例: 夜用）:');
  if(t&&t.trim()){
    const tag='#'+t.trim().replace(/^#/,'');
    if(!CAT_TAGS[activeCat]) CAT_TAGS[activeCat]=[];
    if(!CAT_TAGS[activeCat].includes(tag)) CAT_TAGS[activeCat].push(tag);
    saveData(); renderTagRow();
  }
}

function clearImage(){
  document.getElementById('ocrPreview').style.display='none';
  document.getElementById('ocrPreviewImg').src='';
  document.getElementById('ocrStatus').textContent='';
  document.getElementById('screenshotInput').value='';
}

// ===== URL→タイトル取得 =====
async function fetchLinkTitle(){
  const link=document.getElementById('newLink').value.trim();
  if(!link){ showToast('URLを入力してください'); return; }
  showToast('タイトルを取得中...');
  try{
    const res=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(link));
    const data=await res.json();
    const match=data.contents.match(/<title[^>]*>([^<]+)<\/title>/i);
    if(match&&match[1]){
      const t=match[1].trim()
        .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
        .replace(/&#39;/g,"'").replace(/&quot;/g,'"');
      document.getElementById('newTitle').value=t;
      showToast('タイトルを取得しました！');
    } else { showToast('タイトルを取得できませんでした'); }
  } catch(e){ showToast('取得失敗。手動で入力してください'); }
}

// ===== 簡易フリガナ推測（ひらがな→カタカナ） =====
function guessYomi(text){
  return text.replace(/[\u3041-\u3096]/g, ch=>String.fromCharCode(ch.charCodeAt(0)+0x60));
}

// ===== 画像選択＆トリミング処理 =====
function handleImageSelect(event){
  const file=event.target.files[0];
  if(!file) return;
  event.target.value='';
  const reader=new FileReader();
  reader.onload=function(e){
    openCropModal(e.target.result);
  };
  reader.readAsDataURL(file);
}

// ===== トリミングモーダル =====
function openCropModal(dataUrl){
  const overlay=document.getElementById('cropOverlay');
  const img=document.getElementById('cropImage');
  // 既存のCropperを破棄
  if(cropperInstance){ cropperInstance.destroy(); cropperInstance=null; }
  img.src=dataUrl;
  overlay.style.display='flex';
  // 画像ロード後にCropper初期化
  img.onload=function(){
    cropperInstance=new Cropper(img,{
      aspectRatio: 1,
      viewMode: 1,
      dragMode: 'move',
      autoCropArea: 0.8,
      restore: false,
      guides: true,
      center: true,
      highlight: false,
      cropBoxMovable: true,
      cropBoxResizable: true,
      toggleDragModeOnDblclick: false,
    });
  };
}
function cancelCrop(){
  if(cropperInstance){ cropperInstance.destroy(); cropperInstance=null; }
  document.getElementById('cropOverlay').style.display='none';
}
function confirmCrop(){
  if(!cropperInstance) return;
  // トリミングした画像をcanvasから取得（400x400px）
  const canvas=cropperInstance.getCroppedCanvas({width:400,height:400});
  const croppedDataUrl=canvas.toDataURL('image/jpeg',0.85);

  // プレビューに反映
  const img=document.getElementById('ocrPreviewImg');
  img.src=croppedDataUrl;
  document.getElementById('ocrPreview').style.display='block';

  // OCRを実行（Tesseract.js）
  const status=document.getElementById('ocrStatus');
  status.textContent='🔍 テキストを読み取り中...';
  runOCR(croppedDataUrl, status);

  cropperInstance.destroy(); cropperInstance=null;
  document.getElementById('cropOverlay').style.display='none';
}

// ===== OCR（Tesseract.js 動的読み込み） =====
function runOCR(dataUrl, statusEl){
  function doRecognize(){
    Tesseract.recognize(dataUrl,'eng+jpn',{
      logger: m=>{
        if(m.status==='recognizing text'){
          statusEl.textContent='🔍 読み取り中... '+Math.round(m.progress*100)+'%';
        }
      }
    }).then(({data:{text}})=>{
      const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>1);
      if(lines.length>0){
        const extracted=lines[0];
        document.getElementById('newTitle').value=extracted;
        const yomi=guessYomi(extracted);
        if(yomi!==extracted) document.getElementById('newYomi').value=yomi;
        statusEl.textContent='✅ 抽出完了！タイトルを確認・編集してください';
        showToast('テキスト抽出完了！');
      } else {
        statusEl.textContent='⚠️ テキストが読み取れませんでした';
      }
    }).catch(()=>{
      statusEl.textContent='⚠️ 読み取りに失敗しました。手動で入力してください';
    });
  }

  if(typeof Tesseract!=='undefined'){
    doRecognize();
  } else {
    // 動的読み込み
    const s=document.createElement('script');
    s.src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js';
    s.onload=doRecognize;
    s.onerror=()=>{ statusEl.textContent='⚠️ OCR機能はオフラインでは使えません'; };
    document.head.appendChild(s);
  }
}

// ===== アイテム保存 =====
function saveItem(){
  const title=document.getElementById('newTitle').value.trim();
  if(!title){ showToast('タイトルを入力してください'); return; }
  const yomi=document.getElementById('newYomi').value.trim();
  const link=document.getElementById('newLink').value.trim();
  const imgSrc=document.getElementById('ocrPreviewImg').src;
  const image=imgSrc&&imgSrc.startsWith('data:')?imgSrc:'';

  if(editingId){
    const item=items.find(x=>x.id===editingId);
    if(item){
      item.title=title; item.yomi=yomi||undefined; item.cat=newCatSel; item.tags=[...newTagSel];
      item.link=link||undefined;
      item.image=image||item.image||undefined;
      if(newCatSel!=='interest') item.status=document.getElementById('statusSelect').value;
      if(newCatSel==='music')    item.type=document.getElementById('typeSelect').value;
      if(newCatSel==='interest'){
        const p=document.getElementById('priceInput').value;
        const d=document.getElementById('deadlineInput').value;
        item.price=p?parseInt(p):undefined;
        item.deadline=d||undefined;
      } else { delete item.price; delete item.deadline; }
    }
    showToast('更新しました！');
  } else {
    const ni={id:Date.now(),title,yomi:yomi||undefined,cat:newCatSel,tags:[...newTagSel],order:items.length};
    if(link)  ni.link=link;
    if(image) ni.image=image;
    if(newCatSel!=='interest') ni.status=document.getElementById('statusSelect').value;
    if(newCatSel==='music')    ni.type=document.getElementById('typeSelect').value;
    if(newCatSel==='interest'){
      const p=document.getElementById('priceInput').value;
      const d=document.getElementById('deadlineInput').value;
      if(p) ni.price=parseInt(p);
      if(d) ni.deadline=d;
    }
    items.push(ni);
    showToast('追加しました！');
  }
  saveData(); closeModal(); renderList();
}

// ===== 設定画面 =====
function openSettings(){
  renderCatToggleList(); renderTagManageList();
  document.getElementById('settingsOverlay').style.display='flex';
}
function closeSettings(){
  document.getElementById('settingsOverlay').style.display='none';
  renderCatTabs(); renderTagRow(); renderList();
}
function renderCatToggleList(){
  document.getElementById('catToggleList').innerHTML=ALL_CATS.map(c=>`
    <div class="settings-row">
      <span class="settings-row-name">${c.emoji} ${c.label}</span>
      <button class="toggle${hiddenCats.has(c.id)?'':' on'}" onclick="toggleCatVisibility('${c.id}')"></button>
    </div>
  `).join('');
}
function toggleCatVisibility(id){
  if(!hiddenCats.has(id)&&visibleCats().length<=1){ showToast('最低1つは表示が必要です'); return; }
  hiddenCats.has(id)?hiddenCats.delete(id):hiddenCats.add(id);
  saveData(); renderCatToggleList();
}

// ===== タグ管理（▲▼ボタン） =====
function renderTagManageList(){
  let html='';
  ALL_CATS.forEach(c=>{
    const tags=CAT_TAGS[c.id]||[];
    html+=`<div class="tag-section-label">${c.emoji} ${c.label}</div>`;
    if(!tags.length){
      html+=`<div style="font-size:13px;color:var(--text3);padding:6px 4px 4px;">タグなし</div>`;
    } else {
      tags.forEach((t,idx)=>{
        const safeT=t.replace(/'/g,"\\'");
        const isFirst=idx===0, isLast=idx===tags.length-1;
        html+=`<div class="tag-manage-row">
          <span class="tag-manage-name">${t}</span>
          <div class="tag-move-btns">
            <button class="tag-move-btn" onclick="moveTag('${c.id}',${idx},-1)" ${isFirst?'disabled':''}>▲</button>
            <button class="tag-move-btn" onclick="moveTag('${c.id}',${idx},+1)" ${isLast?'disabled':''}>▼</button>
          </div>
          <button class="tag-del-btn" onclick="confirmTagDelete('${c.id}','${safeT}')">${SVG_TRASH}</button>
        </div>`;
      });
    }
    html+=`<div class="add-tag-row">
      <input class="add-tag-input" id="newTagInput-${c.id}" placeholder="新しいタグ名" />
      <button class="add-tag-btn" onclick="addTagFromSettings('${c.id}')">追加</button>
    </div>`;
  });
  document.getElementById('tagManageList').innerHTML=html;
}

function moveTag(catId, idx, dir){
  const arr=CAT_TAGS[catId];
  if(!arr) return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=arr.length) return;
  const tmp=arr[idx]; arr[idx]=arr[newIdx]; arr[newIdx]=tmp;
  saveData(); renderTagManageList(); renderTagRow();
}

function confirmTagDelete(catId,tag){
  pendingDeleteTag=tag; pendingDeleteTagCat=catId;
  document.getElementById('tagConfirmName').textContent=tag;
  document.getElementById('tagConfirmOverlay').style.display='flex';
}
function closeTagConfirm(){ document.getElementById('tagConfirmOverlay').style.display='none'; pendingDeleteTag=null; pendingDeleteTagCat=null; }
function executeTagDelete(){
  if(pendingDeleteTag&&pendingDeleteTagCat){
    CAT_TAGS[pendingDeleteTagCat]=CAT_TAGS[pendingDeleteTagCat].filter(t=>t!==pendingDeleteTag);
    saveData(); closeTagConfirm(); renderTagManageList(); showToast('タグを削除しました');
  }
}
function addTagFromSettings(catId){
  const input=document.getElementById('newTagInput-'+catId);
  const t=input.value.trim();
  if(!t){ showToast('タグ名を入力してください'); return; }
  const tag='#'+t.replace(/^#/,'');
  if(!CAT_TAGS[catId]) CAT_TAGS[catId]=[];
  if(CAT_TAGS[catId].includes(tag)){ showToast('同じタグが既にあります'); return; }
  CAT_TAGS[catId].push(tag);
  input.value=''; saveData(); renderTagManageList(); showToast('タグを追加しました');
}

// ===== Toast =====
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ===== サンプルデータ削除・リセット =====
function confirmResetData(){
  if(!confirm('登録したデータをすべて削除してリセットしますか？\n（この操作は元に戻せません）')) return;
  localStorage.removeItem('clip_items');
  localStorage.removeItem('clip_tags');
  localStorage.removeItem('clip_hidden');
  // 状態変数もリセット
  items=[];
  CAT_TAGS={
    music:['#朝用','#ディナー','#テンションアップ','#邦楽','#海外'],
    movie:['#土日用','#ディナー','#海外'],
    book:['#土日用','#集中'],
    interest:['#ガジェット','#ファッション','#食品'],
    other:['#メモ','#その他'],
  };
  hiddenCats=new Set();
  saveData();
  closeSettings();
  renderCatTabs(); renderTagRow(); renderList();
  showToast('✅ データをリセットしました');
}

// ===== アプリ更新（データ保持・キャッシュクリア） =====
async function updateAppVersion(){
  showToast('🔄 最新バージョンに更新中...');
  try{
    // Service Workerのキャッシュを全削除
    if('caches' in window){
      const keys = await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
    // Service Workerの登録を更新
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.update()));
    }
    // 1秒後にハードリロード（データは localStorage に残る）
    setTimeout(()=>{
      window.location.reload(true);
    }, 1000);
  } catch(e){
    // フォールバック：強制リロード
    setTimeout(()=>{ window.location.reload(true); }, 800);
  }
}

// ===== Service Worker =====
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

// ===== 起動 =====
loadData();
renderCatTabs();
renderTagRow();
renderList();
</script>
