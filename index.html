<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ClipApp">
<meta name="theme-color" content="#7C6EFA">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Clip App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0E0E12;--bg2:#17171D;--bg3:#1E1E27;--surface:#25252F;--surface2:#2D2D38;
  --accent:#7C6EFA;--accent2:#A89FFF;--amber:#F0A020;--green:#3FBA7A;--coral:#F06060;
  --text:#F0EFF8;--text2:#9492AA;--text3:#5A5870;
  --border:#33323F;--radius:12px;--radiusSm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden;}
#app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg);}
.header{display:flex;align-items:center;justify-content:space-between;padding:52px 20px 12px;background:var(--bg);flex-shrink:0;}
.header-title{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--text);}
.header-title span{color:var(--accent);}
.header-icons{display:flex;gap:18px;color:var(--text2);}
.header-icons i{font-size:22px;cursor:pointer;}
.cat-tabs{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500;}
.tag-row{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;min-height:0;transition:all .2s;}
.tag-row::-webkit-scrollbar{display:none;}
.tag-row.hidden{padding:0 14px;min-height:0;max-height:0;overflow:hidden;}
.tag-chip{padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.tag-chip.active{background:var(--surface2);border-color:var(--accent2);color:var(--accent2);}
.tag-chip.add-tag{color:var(--accent);border-color:var(--accent);border-style:dashed;}
.sort-bar{display:flex;align-items:center;gap:7px;padding:0 14px 8px;flex-shrink:0;}
.sort-label{font-size:11px;color:var(--text3);}
.sort-btn{padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.sort-btn.active{background:var(--surface2);border-color:var(--text2);color:var(--text);}
.list-area{flex:1;padding:0 12px 80px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.item-card{display:flex;align-items:stretch;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;touch-action:none;position:relative;transition:transform .1s,box-shadow .1s;}
.item-card.dragging{opacity:.75;transform:scale(1.02);box-shadow:0 8px 28px rgba(124,110,250,.3);border-color:var(--accent);z-index:999;}
.item-card.drag-over-top::before{content:'';position:absolute;top:-4px;left:0;right:0;height:3px;background:var(--accent);border-radius:2px;}
.item-card.drag-over-bottom::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:3px;background:var(--accent);border-radius:2px;}
.drag-handle{display:flex;align-items:center;justify-content:center;width:34px;min-height:80px;color:var(--text3);font-size:16px;background:var(--bg3);cursor:grab;}
.item-body{flex:1;padding:12px 8px;}
.item-top{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;}
.item-emoji{font-size:15px;margin-top:1px;}
.item-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.35;}
.item-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px;}
.status-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;}
.badge-free{background:rgba(63,186,122,.15);color:#3FBA7A;}
.badge-paid{background:rgba(240,160,32,.15);color:#F0A020;}
.badge-unknown{background:rgba(90,88,112,.2);color:var(--text3);}
.item-price{font-size:11px;color:var(--amber);font-family:'Space Mono',monospace;}
.item-deadline{font-size:11px;display:flex;align-items:center;gap:3px;}
.item-tags{display:flex;gap:4px;flex-wrap:wrap;}
.item-tag{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:4px;}
.item-actions{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 10px;gap:10px;}
.alexa-btn{display:flex;align-items:center;gap:4px;padding:8px 10px;background:linear-gradient(135deg,#1E90AA,#1A7AEE);border-radius:var(--radiusSm);border:none;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'Space Mono',monospace;}
.alexa-btn i{font-size:13px;}
.delete-btn{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
.fab{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:30px;background:var(--accent);border:none;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(124,110,250,.45);z-index:50;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-size:16px;font-weight:700;}
.close-btn{background:var(--surface);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
.upload-btn{width:100%;padding:15px;border:1.5px dashed var(--accent);border-radius:var(--radius);background:rgba(124,110,250,.07);color:var(--accent2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;font-family:'Noto Sans JP',sans-serif;}
.form-label{font-size:12px;color:var(--text3);margin-bottom:5px;display:block;}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radiusSm);color:var(--text);padding:12px 14px;font-size:15px;margin-bottom:14px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.form-input:focus{border-color:var(--accent);}
.cat-select-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.cat-sel-btn{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.cat-sel-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.form-select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radiusSm);color:var(--text);padding:12px 14px;font-size:15px;margin-bottom:14px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.form-row{display:flex;gap:10px;}
.form-row>div{flex:1;}
.submit-btn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:4px;}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px;}
.confirm-box{background:var(--bg2);border-radius:var(--radius);padding:22px;width:100%;max-width:320px;border:1px solid var(--border);}
.confirm-title{font-size:15px;font-weight:500;margin-bottom:8px;}
.confirm-name{font-size:13px;color:var(--text2);margin-bottom:16px;}
.confirm-btns{display:flex;gap:8px;}
.confirm-cancel{flex:1;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radiusSm);color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:14px;}
.confirm-del{flex:1;padding:12px;background:rgba(240,96,96,.15);border:1px solid var(--coral);border-radius:var(--radiusSm);color:var(--coral);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:14px;}
.alexa-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px;}
.alexa-box{background:linear-gradient(135deg,#0A2040,#0D3060);border:1px solid #1A7AEE;border-radius:var(--radius);padding:28px 24px;width:100%;max-width:320px;text-align:center;}
.alexa-ring{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,#1E90AA,#1A7AEE);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(26,122,238,.5)}50%{box-shadow:0 0 0 18px rgba(26,122,238,0)}}
.alexa-title{font-size:15px;font-weight:500;margin-bottom:6px;}
.alexa-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.alexa-close{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:var(--text);padding:11px 28px;border-radius:var(--radiusSm);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:14px;}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:11px 22px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-state i{font-size:44px;margin-bottom:12px;display:block;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title"><span>Clip</span> App</div>
    <div class="header-icons">
      <i class="ti ti-search"></i>
      <i class="ti ti-settings"></i>
    </div>
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="tag-row" id="tagRow"></div>
  <div class="sort-bar">
    <span class="sort-label">並び順:</span>
    <button class="sort-btn active" data-sort="custom" onclick="setSort('custom')">登録順</button>
    <button class="sort-btn" data-sort="deadline" onclick="setSort('deadline')">期限順</button>
    <button class="sort-btn" data-sort="alpha" onclick="setSort('alpha')">AZ順</button>
  </div>
  <div class="list-area" id="listArea"></div>
  <button class="fab" onclick="openModal()"><i class="ti ti-plus"></i></button>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="closeModalIfBg(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">アイテムを追加</span>
      <button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <button class="upload-btn" onclick="simulateOCR()">
      <i class="ti ti-camera"></i> スクショから自動抽出（AI）
    </button>
    <label class="form-label">タイトル</label>
    <input class="form-input" id="newTitle" placeholder="例: Lofi Hip Hop Mix" />
    <label class="form-label">大項目</label>
    <div class="cat-select-row" id="catSelectRow"></div>
    <div id="statusSection">
      <label class="form-label">状態</label>
      <select class="form-select" id="statusSelect"></select>
    </div>
    <div id="typeSection" style="display:none;">
      <label class="form-label">種別</label>
      <select class="form-select" id="typeSelect">
        <option value="album">アルバム</option>
        <option value="song">曲</option>
      </select>
    </div>
    <div id="interestSection" style="display:none;">
      <div class="form-row">
        <div>
          <label class="form-label">価格（任意）</label>
          <input class="form-input" id="priceInput" placeholder="¥0" type="number" />
        </div>
        <div>
          <label class="form-label">購入期限（任意）</label>
          <input class="form-input" id="deadlineInput" type="date" />
        </div>
      </div>
    </div>
    <label class="form-label">シチュエーションタグ</label>
    <div class="cat-select-row" id="tagSelectRow"></div>
    <button class="submit-btn" onclick="addItem()">保存する</button>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay" style="display:none;">
  <div class="confirm-box">
    <div class="confirm-title">このアイテムを削除しますか？</div>
    <div class="confirm-name" id="confirmItemName"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">キャンセル</button>
      <button class="confirm-del" onclick="executeDelete()">削除する</button>
    </div>
  </div>
</div>

<div class="alexa-overlay" id="alexaOverlay" style="display:none;">
  <div class="alexa-box">
    <div class="alexa-ring"><i class="ti ti-player-play" style="font-size:28px;color:#fff;"></i></div>
    <div class="alexa-title" id="alexaTitle"></div>
    <div class="alexa-sub">Echoスピーカーに送信中...</div>
    <button class="alexa-close" onclick="closeAlexa()">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 大項目（「すべて」なし） =====
const CATS = [
  {id:'music', label:'音楽', emoji:'🎵'},
  {id:'movie', label:'映画', emoji:'🎬'},
  {id:'book',  label:'読書', emoji:'📚'},
  {id:'interest', label:'関心', emoji:'✨'},
  {id:'other', label:'その他', emoji:'📦'},
];

// ===== タグは大項目ごとに管理 =====
let CAT_TAGS = {
  music:    ['#朝用','#ディナー','#テンションアップ','#邦楽','#海外'],
  movie:    ['#土日用','#ディナー','#海外'],
  book:     ['#土日用','#集中'],
  interest: ['#ガジェット','#ファッション','#食品'],
  other:    ['#メモ','#その他'],
};

let items = [
  {id:1,title:'Lofi Hip Hop Playlist',cat:'music',status:'free',type:'album',tags:['#朝用','#集中'],order:0},
  {id:2,title:'Dune: Part Two',cat:'movie',status:'paid',tags:['#土日用'],order:1},
  {id:3,title:'三体（劉慈欣）',cat:'book',status:'free',tags:['#土日用'],order:2},
  {id:4,title:'HHKB Professional HYBRID',cat:'interest',price:35200,deadline:'2026-06-15',tags:['#ガジェット'],order:3},
  {id:5,title:'進撃の巨人 最終巻',cat:'book',status:'free',tags:['#土日用'],order:4},
  {id:6,title:'Interstellar',cat:'movie',status:'paid',tags:['#ディナー'],order:5},
];

// 初期選択は最初の大項目
let activeCat = CATS[0].id;
let activeTags = new Set();
let sortMode = 'custom';
let newCatSel = 'music', newTagSel = new Set(), pendingDeleteId = null;

const STATUS_OPTIONS = {
  music:    [{v:'free',l:'無料'},{v:'paid',l:'有料'},{v:'unknown',l:'不明'}],
  movie:    [{v:'free',l:'無料'},{v:'paid',l:'有料'},{v:'unknown',l:'不明'}],
  other:    [{v:'free',l:'無料'},{v:'paid',l:'有料'},{v:'unknown',l:'不明'}],
  book:     [{v:'free',l:'無料'},{v:'general',l:'一般'}],
  interest: [],
};

function catEmoji(c){return CATS.find(x=>x.id===c)?.emoji||'📦';}

function statusBadge(s){
  if(!s||s==='unknown') return '<span class="status-badge badge-unknown">不明</span>';
  if(s==='free')    return '<span class="status-badge badge-free">無料</span>';
  if(s==='paid')    return '<span class="status-badge badge-paid">有料</span>';
  if(s==='general') return '<span class="status-badge badge-free">一般</span>';
  return '';
}

function deadlineBadge(d){
  if(!d) return '';
  const days = Math.round((new Date(d)-new Date())/(1000*86400));
  const col = days<=3?'var(--coral)':days<=7?'var(--amber)':'var(--text2)';
  return `<span class="item-deadline" style="color:${col}"><i class="ti ti-bell" style="font-size:11px;"></i>${d}（${days}日後）</span>`;
}

// ===== 大項目タブ（「すべて」なし） =====
function renderCatTabs(){
  document.getElementById('catTabs').innerHTML = CATS.map(c=>
    `<button class="cat-tab${activeCat===c.id?' active':''}" onclick="setCat('${c.id}')">${c.emoji} ${c.label}</button>`
  ).join('');
}

// ===== タグ行：選択中の大項目のタグのみ表示 =====
function renderTagRow(){
  const tags = CAT_TAGS[activeCat] || [];
  const row = document.getElementById('tagRow');
  if(tags.length === 0){
    row.innerHTML = '';
    row.classList.add('hidden');
    return;
  }
  row.classList.remove('hidden');
  row.innerHTML = tags.map(t=>
    `<button class="tag-chip${activeTags.has(t)?' active':''}" onclick="toggleTag('${t}')">${t}</button>`
  ).join('') + `<button class="tag-chip add-tag" onclick="addTagFromRow()">＋ タグ</button>`;
}

function setCat(id){
  activeCat = id;
  activeTags.clear(); // カテゴリ切り替え時はタグ絞り込みをリセット
  renderCatTabs();
  renderTagRow();
  renderList();
}

function toggleTag(t){
  activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t);
  renderTagRow();
  renderList();
}

function setSort(m){
  sortMode = m;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.sort===m));
  renderList();
}

function getFiltered(){
  let res = items.filter(i => i.cat === activeCat);
  if(activeTags.size > 0) res = res.filter(i=>(i.tags||[]).some(t=>activeTags.has(t)));
  if(sortMode==='alpha') res.sort((a,b)=>a.title.localeCompare(b.title,'ja'));
  else if(sortMode==='deadline') res.sort((a,b)=>{
    if(!a.deadline&&!b.deadline) return 0;
    if(!a.deadline) return 1; if(!b.deadline) return -1;
    return new Date(a.deadline)-new Date(b.deadline);
  });
  else res.sort((a,b)=>a.order-b.order);
  return res;
}

function renderList(){
  const el = document.getElementById('listArea');
  const list = getFiltered();
  if(!list.length){
    el.innerHTML = '<div class="empty-state"><i class="ti ti-mood-empty"></i><div>アイテムがありません</div></div>';
    return;
  }
  el.innerHTML = list.map(item=>{
    const canAlexa = item.cat==='music'||item.cat==='movie';
    const tags = (item.tags||[]).map(t=>`<span class="item-tag">${t}</span>`).join('');
    const priceStr = item.price ? `<span class="item-price">¥${item.price.toLocaleString()}</span>` : '';
    return `<div class="item-card" id="card-${item.id}" data-id="${item.id}">
      <div class="drag-handle"><i class="ti ti-grip-vertical"></i></div>
      <div class="item-body">
        <div class="item-top">
          <span class="item-emoji">${catEmoji(item.cat)}</span>
          <span class="item-title">${item.title}</span>
        </div>
        <div class="item-meta">
          ${item.cat!=='interest'?statusBadge(item.status):''}
          ${priceStr}
          ${item.deadline?deadlineBadge(item.deadline):''}
        </div>
        <div class="item-tags">${tags}</div>
      </div>
      <div class="item-actions">
        ${canAlexa?`<button class="alexa-btn" onclick="playAlexa(${item.id})"><i class="ti ti-player-play"></i>Alexa</button>`:'<span style="width:60px"></span>'}
        <button class="delete-btn" onclick="confirmDelete(${item.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');
  initTouchDrag();
}

// ===== タッチドラッグ =====
function initTouchDrag(){
  const listArea = document.getElementById('listArea');
  let dragging=null, ghost=null, startY=0, origRect=null;
  function getCards(){return[...listArea.querySelectorAll('.item-card')];}
  listArea.querySelectorAll('.drag-handle').forEach(handle=>{
    handle.addEventListener('touchstart',e=>{
      const card=handle.closest('.item-card');
      dragging=card; origRect=card.getBoundingClientRect(); startY=e.touches[0].clientY;
      ghost=card.cloneNode(true);
      ghost.style.cssText=`position:fixed;left:${origRect.left}px;top:${origRect.top}px;width:${origRect.width}px;z-index:999;opacity:.8;pointer-events:none;border:1.5px solid var(--accent);border-radius:12px;box-shadow:0 8px 28px rgba(124,110,250,.35);`;
      document.body.appendChild(ghost); card.style.opacity='0.3'; e.preventDefault();
    },{passive:false});
  });
  document.addEventListener('touchmove',e=>{
    if(!dragging||!ghost) return; e.preventDefault();
    const ty=e.touches[0].clientY; ghost.style.top=(origRect.top+(ty-startY))+'px';
    getCards().forEach(c=>c.classList.remove('drag-over-top','drag-over-bottom'));
    const under=document.elementFromPoint(origRect.left+origRect.width/2,ty);
    const tc=under?.closest('.item-card');
    if(tc&&tc!==dragging){const tr=tc.getBoundingClientRect();tc.classList.add(ty<tr.top+tr.height/2?'drag-over-top':'drag-over-bottom');}
  },{passive:false});
  document.addEventListener('touchend',e=>{
    if(!dragging||!ghost) return;
    const ty=e.changedTouches[0].clientY;
    const under=document.elementFromPoint(origRect.left+origRect.width/2,ty);
    const tc=under?.closest('.item-card');
    if(tc&&tc!==dragging){
      const dragId=parseInt(dragging.dataset.id), targetId=parseInt(tc.dataset.id);
      const di=items.findIndex(x=>x.id===dragId), ti=items.findIndex(x=>x.id===targetId);
      const tr=tc.getBoundingClientRect(); const insertAfter=ty>=tr.top+tr.height/2;
      const[moved]=items.splice(di,1); const newTi=items.findIndex(x=>x.id===targetId);
      items.splice(insertAfter?newTi+1:newTi,0,moved); items.forEach((x,i)=>x.order=i);
    }
    ghost.remove(); ghost=null;
    getCards().forEach(c=>c.classList.remove('drag-over-top','drag-over-bottom'));
    dragging.style.opacity=''; dragging=null; renderList();
  });
}

// ===== Alexa =====
let alexaTimer=null;
function playAlexa(id){
  const item=items.find(x=>x.id===id);
  document.getElementById('alexaTitle').textContent=item?.title||'';
  document.getElementById('alexaOverlay').style.display='flex';
  clearTimeout(alexaTimer);
  alexaTimer=setTimeout(()=>{closeAlexa();showToast('Echoスピーカーに送信しました！');},2500);
}
function closeAlexa(){clearTimeout(alexaTimer);document.getElementById('alexaOverlay').style.display='none';}

// ===== 削除 =====
function confirmDelete(id){
  pendingDeleteId=id;
  document.getElementById('confirmItemName').textContent=items.find(x=>x.id===id)?.title||'';
  document.getElementById('confirmOverlay').style.display='flex';
}
function closeConfirm(){document.getElementById('confirmOverlay').style.display='none';pendingDeleteId=null;}
function executeDelete(){
  if(pendingDeleteId){items=items.filter(x=>x.id!==pendingDeleteId);closeConfirm();renderList();showToast('削除しました');}
}

// ===== 追加モーダル =====
function openModal(){
  newCatSel=activeCat; newTagSel=new Set();
  document.getElementById('newTitle').value='';
  document.getElementById('priceInput').value='';
  document.getElementById('deadlineInput').value='';
  renderCatSelect(); renderTagSelect(); updateDynamicFields();
  document.getElementById('modalOverlay').style.display='flex';
}
function closeModal(){document.getElementById('modalOverlay').style.display='none';}
function closeModalIfBg(e){if(e.target.id==='modalOverlay')closeModal();}

function renderCatSelect(){
  document.getElementById('catSelectRow').innerHTML=CATS.map(c=>
    `<button class="cat-sel-btn${newCatSel===c.id?' selected':''}" onclick="selectNewCat('${c.id}')">${c.emoji} ${c.label}</button>`
  ).join('');
}
function selectNewCat(id){newCatSel=id;newTagSel=new Set();renderCatSelect();updateDynamicFields();renderTagSelect();}
function updateDynamicFields(){
  const opts=STATUS_OPTIONS[newCatSel]||[];
  const ss=document.getElementById('statusSection');
  const ts=document.getElementById('typeSection');
  const is=document.getElementById('interestSection');
  const sel=document.getElementById('statusSelect');
  if(newCatSel==='interest'){ss.style.display='none';is.style.display='block';}
  else{ss.style.display='block';is.style.display='none';sel.innerHTML=opts.map(o=>`<option value="${o.v}">${o.l}</option>`).join('');}
  ts.style.display=newCatSel==='music'?'block':'none';
}

// モーダル内タグも選択中大項目のタグのみ表示
function renderTagSelect(){
  const tags = CAT_TAGS[newCatSel]||[];
  document.getElementById('tagSelectRow').innerHTML=tags.map(t=>
    `<button class="tag-chip${newTagSel.has(t)?' active':''}" onclick="toggleNewTag('${t}')">${t}</button>`
  ).join('')+'<button class="tag-chip add-tag" onclick="addTagInModal()">＋ 新規</button>';
}
function toggleNewTag(t){newTagSel.has(t)?newTagSel.delete(t):newTagSel.add(t);renderTagSelect();}

function addTagInModal(){
  const t=prompt('新しいタグ名（例: 夜用）:');
  if(t&&t.trim()){
    const tag='#'+t.trim().replace(/^#/,'');
    if(!CAT_TAGS[newCatSel]) CAT_TAGS[newCatSel]=[];
    if(!CAT_TAGS[newCatSel].includes(tag)) CAT_TAGS[newCatSel].push(tag);
    renderTagSelect(); renderTagRow();
  }
}
function addTagFromRow(){
  const t=prompt('新しいタグ名（例: 夜用）:');
  if(t&&t.trim()){
    const tag='#'+t.trim().replace(/^#/,'');
    if(!CAT_TAGS[activeCat]) CAT_TAGS[activeCat]=[];
    if(!CAT_TAGS[activeCat].includes(tag)) CAT_TAGS[activeCat].push(tag);
    renderTagRow();
  }
}

function simulateOCR(){
  const s=['Lofi Girl 24/7 Radio','進撃の巨人 全34巻','Sony WH-1000XM5','Oppenheimer (2023)','村上春樹 - ノルウェイの森'];
  document.getElementById('newTitle').value=s[Math.floor(Math.random()*s.length)];
  showToast('AI抽出完了！');
}

function addItem(){
  const title=document.getElementById('newTitle').value.trim();
  if(!title){showToast('タイトルを入力してください');return;}
  const ni={id:Date.now(),title,cat:newCatSel,tags:[...newTagSel],order:items.length};
  if(newCatSel!=='interest') ni.status=document.getElementById('statusSelect').value;
  if(newCatSel==='music') ni.type=document.getElementById('typeSelect').value;
  if(newCatSel==='interest'){
    const p=document.getElementById('priceInput').value;
    const d=document.getElementById('deadlineInput').value;
    if(p) ni.price=parseInt(p);
    if(d) ni.deadline=d;
  }
  items.push(ni); closeModal(); renderList(); showToast('追加しました！');
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ===== Service Worker =====
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

// ===== 初期描画 =====
renderCatTabs();
renderTagRow();
renderList();
</script>
